<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>oikos — a practice in delhi</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@1,400;1,500&family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --cream:     #FFF8EB;
    --forest:    #0B3910;
    --terracotta:#B46A2C;
    --sand:      #ECCDB2;
    --honey:     #DA9B66;
    --gold:      #E4C58A;
    --earth:     #3C230F;
    --berry:     #6E1919;
    --sage:      #939991;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--cream);
    color: var(--forest);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-weight: 300;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow: hidden;
  }

  /* ---------- letterbox shell ---------- */
  .shell {
    height: 100vh;
    width: 100vw;
    display: grid;
    grid-template-rows: 12vh 64vh 24vh;
    background: var(--cream);
  }

  /* ---------- top band ---------- */
  .band-top {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 0 clamp(20px, 4vw, 56px);
    background: var(--cream);
    border-bottom: 1px solid rgba(11, 57, 16, 0.08);
  }

  .wordmark {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: clamp(20px, 1.9vw, 26px);
    letter-spacing: -0.01em;
    color: var(--forest);
    display: flex;
    align-items: baseline;
    gap: 0.5ch;
  }
  .wordmark .dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    background: var(--terracotta);
    border-radius: 50%;
    transform: translateY(-3px);
  }

  .nav {
    display: flex;
    gap: clamp(20px, 3vw, 44px);
    align-items: center;
    font-size: clamp(12px, 0.9vw, 14px);
    letter-spacing: 0.01em;
    color: var(--forest);
    font-weight: 300;
  }
  .nav span.sep {
    color: var(--sage);
    opacity: 0.5;
  }
  .nav a {
    color: var(--forest);
    text-decoration: none;
    padding-bottom: 2px;
    border-bottom: 1px solid transparent;
    transition: border-color 240ms cubic-bezier(0.22, 1, 0.36, 1);
  }
  .nav a:hover { border-bottom-color: var(--terracotta); }

  .cta-row {
    display: flex;
    justify-content: flex-end;
    align-items: center;
  }
  .cta {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--forest);
    color: var(--cream);
    text-decoration: none;
    padding: 9px 18px 9px 20px;
    border-radius: 999px;
    font-size: 12px;
    letter-spacing: 0.02em;
    font-weight: 400;
    transition: background 240ms cubic-bezier(0.22, 1, 0.36, 1);
  }
  .cta:hover { background: var(--earth); }
  .cta .arrow {
    display: inline-block;
    width: 14px;
    height: 1px;
    background: var(--cream);
    position: relative;
  }
  .cta .arrow::after {
    content: '';
    position: absolute;
    right: 0;
    top: -3px;
    width: 7px;
    height: 7px;
    border-top: 1px solid var(--cream);
    border-right: 1px solid var(--cream);
    transform: rotate(45deg);
  }

  /* ---------- video band ---------- */
  .band-video {
    position: relative;
    background: var(--cream);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .video-frame {
    position: relative;
    width: 100%;
    height: 100%;
    /* letterbox preserved via inner aspect wrapper */
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--cream);
  }
  .video-aspect {
    position: relative;
    width: 100%;
    /* 21:9 letterbox — cream bars top/bottom inside this band */
    aspect-ratio: 21 / 9;
    max-height: 100%;
    overflow: hidden;
    background: var(--forest);
  }
  /* if the band is shorter than the aspect would need, cap by height */
  @media (min-aspect-ratio: 21/9) {
    .video-aspect { height: 100%; width: auto; }
  }
  .video-aspect video,
  .video-aspect .poster {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .video-aspect .poster {
    background-image: url('../../web/public/photos/biophilic.jpg');
    background-size: cover;
    background-position: center;
  }
  /* forest-tinted micro gradient over video */
  .video-aspect::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(180deg, rgba(11,57,16,0.18) 0%, rgba(11,57,16,0.0) 22%, rgba(11,57,16,0.0) 70%, rgba(11,57,16,0.22) 100%),
      linear-gradient(90deg, rgba(11,57,16,0.10) 0%, rgba(11,57,16,0.0) 30%);
    pointer-events: none;
    z-index: 2;
  }

  /* tiny corner credits inside the video */
  .credit {
    position: absolute;
    z-index: 3;
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 10px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: rgba(255, 248, 235, 0.78);
    pointer-events: none;
    user-select: none;
  }
  .credit.tl { top: 18px; left: 22px; }
  .credit.br { bottom: 18px; right: 22px; letter-spacing: 0.28em; }
  .credit .pip {
    display: inline-block;
    width: 5px;
    height: 5px;
    background: var(--terracotta);
    border-radius: 50%;
    margin: 0 8px 1px 0;
    vertical-align: middle;
  }

  /* ---------- bottom band ---------- */
  .band-bottom {
    position: relative;
    background: var(--cream);
    padding: clamp(20px, 3vh, 36px) clamp(24px, 5vw, 72px) clamp(18px, 2.6vh, 28px);
    display: grid;
    grid-template-rows: 1fr auto;
    align-items: center;
  }
  .band-bottom::before {
    content: '';
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: clamp(80px, 9vw, 132px);
    height: 1px;
    background: var(--terracotta);
  }

  .headline {
    text-align: center;
    color: var(--forest);
    font-family: 'Inter', sans-serif;
    font-weight: 200;
    font-size: clamp(28px, 4.4vw, 60px);
    line-height: 1.08;
    letter-spacing: -0.025em;
  }
  .headline .em {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-weight: 500;
    color: var(--terracotta);
    letter-spacing: -0.01em;
  }
  .headline .second {
    display: block;
    color: var(--forest);
    opacity: 0.62;
    font-weight: 200;
    font-size: 0.42em;
    letter-spacing: 0.01em;
    margin-top: clamp(8px, 1.1vh, 14px);
  }

  .meta {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    border-top: 1px solid rgba(11, 57, 16, 0.12);
    margin-top: clamp(14px, 2vh, 22px);
    padding-top: clamp(12px, 1.6vh, 18px);
  }
  .meta-cell {
    text-align: center;
    padding: 0 clamp(8px, 1.2vw, 18px);
    position: relative;
  }
  .meta-cell + .meta-cell::before {
    content: '';
    position: absolute;
    left: 0;
    top: 8%;
    bottom: 8%;
    width: 1px;
    background: rgba(11, 57, 16, 0.10);
  }
  .meta-label {
    font-family: 'Inter', sans-serif;
    font-size: 9.5px;
    letter-spacing: 0.34em;
    text-transform: uppercase;
    color: var(--sage);
    font-weight: 400;
    margin-bottom: 6px;
  }
  .meta-value {
    font-family: 'Inter', sans-serif;
    font-size: clamp(11px, 0.95vw, 13.5px);
    color: var(--forest);
    font-weight: 400;
    letter-spacing: 0.005em;
  }
  .meta-value .it {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-weight: 500;
    color: var(--forest);
  }

  /* ---------- reduced motion ---------- */
  @media (prefers-reduced-motion: reduce) {
    video { display: none !important; }
    .video-aspect .poster { display: block; }
  }

  /* ---------- small screens: keep architecture but tighten ---------- */
  @media (max-width: 720px) {
    .shell { grid-template-rows: 10vh 50vh 40vh; }
    .nav { display: none; }
    .band-top { grid-template-columns: 1fr auto; }
    .cta-row { justify-self: end; }
    .headline { font-size: clamp(26px, 7vw, 42px); }
    .meta { grid-template-columns: repeat(2, 1fr); row-gap: 14px; }
    .meta-cell:nth-child(3)::before { display: none; }
    .credit { font-size: 9px; }
  }
</style>
</head>
<body>

<main class="shell" role="main">

  <!-- ============== TOP BAND ============== -->
  <header class="band-top">
    <div class="wordmark">
      oikos<span class="dot" aria-hidden="true"></span>
    </div>

    <nav class="nav" aria-label="primary">
      <a href="#what">what</a>
      <span class="sep">/</span>
      <a href="#why">why</a>
      <span class="sep">/</span>
      <a href="#how">how</a>
      <span class="sep">/</span>
      <a href="#voices">voices</a>
    </nav>

    <div class="cta-row">
      <a href="#brief" class="cta">
        brief the studio
        <span class="arrow" aria-hidden="true"></span>
      </a>
    </div>
  </header>

  <!-- ============== VIDEO BAND ============== -->
  <section class="band-video" aria-label="studio film">
    <div class="video-frame">
      <div class="video-aspect">
        <div class="poster" aria-hidden="true"></div>
        <video
          autoplay
          muted
          loop
          playsinline
          preload="auto"
          poster="../../web/public/photos/biophilic.jpg"
          aria-label="ambient footage of an oikos workspace"
        >
          <source src="../video/hero.mp4" type="video/mp4" />
        </video>

        <span class="credit tl"><span class="pip" aria-hidden="true"></span>oikos &nbsp;&middot;&nbsp; 01 / hero</span>
        <span class="credit br">delhi &nbsp;&middot;&nbsp; 28&deg;c</span>
      </div>
    </div>
  </section>

  <!-- ============== BOTTOM BAND ============== -->
  <section class="band-bottom">
    <h1 class="headline">
      we make offices that <span class="em">breathe.</span>
      <span class="second">a small practice in delhi.</span>
    </h1>

    <dl class="meta" aria-label="practice metadata">
      <div class="meta-cell">
        <div class="meta-label">practice</div>
        <div class="meta-value">biophilic interiors</div>
      </div>
      <div class="meta-cell">
        <div class="meta-label">studio</div>
        <div class="meta-value">angelina <span class="it">&amp;</span> three makers</div>
      </div>
      <div class="meta-cell">
        <div class="meta-label">established</div>
        <div class="meta-value">2019</div>
      </div>
      <div class="meta-cell">
        <div class="meta-label">location</div>
        <div class="meta-value">delhi, india</div>
      </div>
    </dl>
  </section>

</main>

<script>
  // Reduced-motion: pause video, fall back to poster
  (function () {
    var mq = window.matchMedia('(prefers-reduced-motion: reduce)');
    var v = document.querySelector('.video-aspect video');
    function apply() {
      if (!v) return;
      if (mq.matches) {
        try { v.pause(); } catch (e) {}
        v.removeAttribute('autoplay');
      }
    }
    apply();
    if (mq.addEventListener) mq.addEventListener('change', apply);
  })();
</script>

</body>
</html>
