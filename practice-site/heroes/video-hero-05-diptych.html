<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>oikos — diptych</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@1,400&family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FFF8EB;
    --cream-deep:#F7EEDA;
    --forest:#0B3910;
    --terracotta:#B46A2C;
    --sand:#ECCDB2;
    --honey:#DA9B66;
    --gold:#E4C58A;
    --earth:#3C230F;
    --berry:#6E1919;
    --sage:#939991;

    --band-top:64px;
    --band-bottom:28vh;
    --rule:1px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--cream);color:var(--forest);font-family:'Inter',system-ui,sans-serif;font-weight:300;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  body{min-height:100vh;overflow-x:hidden}

  /* Outer shell — vertical stack: top band / panels / bottom band */
  .shell{
    display:grid;
    grid-template-rows: var(--band-top) 1fr var(--band-bottom);
    min-height:100vh;
    width:100%;
  }

  /* Top band — wordmark, est line, pill cta */
  .topband{
    background:var(--cream);
    border-bottom:var(--rule) solid var(--terracotta);
    display:grid;
    grid-template-columns: 1fr auto 1fr;
    align-items:center;
    padding:0 28px;
    position:relative;
    z-index:3;
  }
  .wordmark{
    font-family:'Inter',sans-serif;
    font-weight:400;
    font-size:20px;
    letter-spacing:-0.01em;
    color:var(--forest);
    text-transform:lowercase;
  }
  .est{
    font-family:'Inter',sans-serif;
    font-weight:300;
    font-size:11px;
    letter-spacing:0.18em;
    color:var(--earth);
    text-transform:lowercase;
    white-space:nowrap;
  }
  .est .dot{color:var(--terracotta);margin:0 6px}
  .cta-wrap{display:flex;justify-content:flex-end}
  .cta{
    font-family:'Inter',sans-serif;
    font-weight:400;
    font-size:11px;
    letter-spacing:0.12em;
    text-transform:lowercase;
    color:var(--cream);
    background:var(--forest);
    padding:8px 16px;
    border-radius:999px;
    text-decoration:none;
    display:inline-flex;
    align-items:center;
    gap:8px;
    transition:background .35s cubic-bezier(.22,1,.36,1);
  }
  .cta:hover{background:var(--earth)}
  .cta .arrow{font-size:14px;line-height:1}

  /* Panels — the diptych */
  .panels{
    position:relative;
    display:grid;
    grid-template-columns: 1fr var(--rule) 1fr;
    min-height:0;
    width:100%;
    overflow:hidden;
    background:var(--forest);
  }
  .panel{
    position:relative;
    overflow:hidden;
    background:var(--earth);
  }
  .panel video,
  .panel img.still{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .divider{
    background:var(--terracotta);
    width:var(--rule);
    height:100%;
    position:relative;
    z-index:2;
  }

  /* small corner tick on each panel — quiet, not decorative slop */
  .tick{
    position:absolute;
    top:18px;
    font-family:'Inter',sans-serif;
    font-weight:300;
    font-size:10px;
    letter-spacing:0.22em;
    text-transform:lowercase;
    color:var(--cream);
    mix-blend-mode:normal;
    z-index:2;
    text-shadow:0 1px 2px rgba(11,57,16,.35);
    padding:4px 8px;
  }
  .tick.left{left:18px}
  .tick.right{right:18px}

  /* Bottom band — manifesto + caption row */
  .bottomband{
    background:var(--cream-deep);
    border-top:var(--rule) solid var(--terracotta);
    display:grid;
    grid-template-rows: 1fr auto;
    align-items:center;
    padding:32px 28px 24px;
    position:relative;
    z-index:3;
  }
  .manifesto{
    font-family:'Inter',sans-serif;
    font-weight:200;
    color:var(--forest);
    text-align:center;
    line-height:1.18;
    letter-spacing:-0.018em;
    font-size:clamp(28px, 4.4vw, 56px);
    max-width:22ch;
    margin:0 auto;
  }
  .manifesto .br{display:block}
  .manifesto em{
    font-family:'EB Garamond', serif;
    font-style:italic;
    font-weight:400;
    color:var(--terracotta);
    letter-spacing:0;
  }

  .caption-row{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:24px;
    margin-top:18px;
    max-width:1000px;
    width:100%;
    margin-left:auto;
    margin-right:auto;
    padding:0 8px;
  }
  .caption{
    font-family:'Inter',sans-serif;
    font-weight:300;
    font-size:12px;
    letter-spacing:0.04em;
    color:var(--earth);
    text-transform:lowercase;
    opacity:.85;
  }
  .caption.left{text-align:left}
  .caption.right{text-align:right}

  /* Mobile — stack video on top, photo below, manifesto remains last */
  @media (max-width: 900px){
    :root{
      --band-top:56px;
      --band-bottom:auto;
    }
    .shell{
      grid-template-rows: var(--band-top) auto auto;
    }
    .panels{
      grid-template-columns: 1fr;
      grid-template-rows: 46vh var(--rule) 46vh;
      height:auto;
    }
    .divider{
      width:100%;
      height:var(--rule);
    }
    .tick.right{right:auto;left:18px;top:auto;bottom:18px}
    .tick.left{top:18px}
    .bottomband{
      padding:28px 20px 22px;
    }
    .manifesto{
      font-size:clamp(24px,7vw,36px);
      max-width:18ch;
    }
    .caption-row{
      grid-template-columns:1fr;
      gap:6px;
      margin-top:14px;
    }
    .caption.right{text-align:left}
    .est{font-size:10px;letter-spacing:0.14em}
    .est .label-short{display:none}
    .wordmark{font-size:18px}
  }

  /* Reduced motion — pause video, show poster only */
  @media (prefers-reduced-motion: reduce){
    video.hero-video{display:none}
    .panel.video-panel{
      background-image:var(--poster-bg);
      background-size:cover;
      background-position:center;
    }
  }
</style>
</head>
<body>
  <main class="shell" role="main">

    <!-- top band -->
    <header class="topband" aria-label="oikos masthead">
      <div class="wordmark">oikos</div>
      <div class="est"><span>delhi</span><span class="dot">·</span><span>est. 2022</span></div>
      <div class="cta-wrap">
        <a class="cta" href="#contact" aria-label="speak with the studio">
          <span>speak with the studio</span>
          <span class="arrow" aria-hidden="true">→</span>
        </a>
      </div>
    </header>

    <!-- diptych panels -->
    <section class="panels" aria-label="diptych">
      <div class="panel video-panel" style="--poster-bg:url('../../web/public/photos/concierge.jpg')">
        <video
          class="hero-video"
          autoplay
          muted
          loop
          playsinline
          preload="auto"
          poster="../../web/public/photos/concierge.jpg"
          aria-label="a working day at the studio, just finishing">
          <source src="../video/hero.mp4" type="video/mp4" />
        </video>
        <span class="tick left">a working day</span>
      </div>

      <div class="divider" aria-hidden="true"></div>

      <div class="panel still-panel">
        <img
          class="still"
          src="../../web/public/photos/biophilic.jpg"
          alt="a corner of the studio restored with biophilic materials, lit late"
          loading="eager"
          decoding="async" />
        <span class="tick right">a corner restored</span>
      </div>
    </section>

    <!-- bottom band -->
    <footer class="bottomband" aria-label="manifesto">
      <p class="manifesto">
        <span class="br">we restructure offices</span>
        <span class="br">into rooms that <em>breathe</em>.</span>
      </p>
      <div class="caption-row">
        <span class="caption left">&rarr;&nbsp;&nbsp;a working day, just finishing</span>
        <span class="caption right">&rarr;&nbsp;&nbsp;a corner restored, lit late</span>
      </div>
    </footer>

  </main>
</body>
</html>
