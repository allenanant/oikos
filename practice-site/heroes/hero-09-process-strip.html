<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>oikos — manifesto + process strip</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@1,400;1,500&family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --cream:      #FFF8EB;
    --forest:     #0B3910;
    --terracotta: #B46A2C;
    --sand:       #ECCDB2;
    --honey:      #DA9B66;
    --gold:       #E4C58A;
    --earth:      #3C230F;
    --berry:      #6E1919;
    --sage:       #939991;

    --hairline: rgba(180, 106, 44, 0.45);
    --ink-soft: rgba(11, 57, 16, 0.55);
    --ink-faint: rgba(11, 57, 16, 0.35);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  body {
    background: var(--cream);
    color: var(--forest);
    font-family: 'Inter', system-ui, sans-serif;
    font-weight: 300;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
  }

  .hero {
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto auto auto;
    padding: 0;
  }

  /* ---------- 1. Sticky header ---------- */
  .header {
    position: sticky;
    top: 0;
    z-index: 10;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 22px 40px;
    background: var(--cream);
    border-bottom: 1px solid rgba(11, 57, 16, 0.06);
  }

  .wordmark {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 19px;
    letter-spacing: 0.02em;
    color: var(--forest);
  }

  .meta {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--ink-soft);
    text-transform: lowercase;
  }

  /* ---------- 2. Manifesto ---------- */
  .manifesto-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 90px 32px 70px;
  }

  .manifesto {
    max-width: 980px;
    text-align: center;
    font-family: 'Inter', sans-serif;
    font-weight: 200;
    font-size: clamp(34px, 5.4vw, 64px);
    line-height: 1.18;
    letter-spacing: -0.015em;
    color: var(--forest);
    text-wrap: balance;
  }

  .manifesto .em {
    font-family: 'EB Garamond', Georgia, serif;
    font-style: italic;
    font-weight: 500;
    color: var(--terracotta);
    letter-spacing: 0;
  }

  .manifesto br + span,
  .manifesto .line { display: inline; }

  /* ---------- 3. Hairline rule ---------- */
  .rule {
    margin: 0 40px;
    height: 1px;
    background: var(--hairline);
    border: 0;
  }

  /* ---------- 4. Photo ribbon (3-up) ---------- */
  .ribbon {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    padding: 28px 40px 22px;
  }

  .frame {
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .photo {
    position: relative;
    aspect-ratio: 1 / 1;
    width: 100%;
    overflow: hidden;
    background: var(--sand);
  }

  .photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    /* slight desaturation so the three sit together calmly */
    filter: saturate(0.92) contrast(0.98);
    transition: filter 600ms cubic-bezier(0.22, 1, 0.36, 1),
                transform 800ms cubic-bezier(0.22, 1, 0.36, 1);
  }

  .frame:hover .photo img {
    filter: saturate(1) contrast(1);
    transform: scale(1.018);
  }

  .caption {
    display: flex;
    align-items: baseline;
    gap: 10px;
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 12px;
    letter-spacing: 0.14em;
    color: var(--ink-soft);
    text-transform: lowercase;
  }

  .caption .num {
    color: var(--terracotta);
    font-weight: 500;
  }

  .caption .slash {
    color: var(--ink-faint);
  }

  /* ---------- 5. CTA pill ---------- */
  .cta-wrap {
    display: flex;
    justify-content: center;
    padding: 18px 40px 56px;
  }

  .cta {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 13px 24px 14px;
    background: var(--forest);
    color: var(--cream);
    border-radius: 999px;
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 13px;
    letter-spacing: 0.06em;
    text-decoration: none;
    text-transform: lowercase;
    transition: background 300ms ease, transform 400ms cubic-bezier(0.22, 1, 0.36, 1);
  }

  .cta:hover { background: var(--earth); transform: translateY(-1px); }

  .cta .arrow {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 14px;
    line-height: 1;
    transition: transform 300ms cubic-bezier(0.22, 1, 0.36, 1);
  }

  .cta:hover .arrow { transform: translateX(3px); }

  /* ---------- Responsive ---------- */
  @media (max-width: 760px) {
    .header { padding: 18px 22px; }
    .manifesto-wrap { padding: 56px 22px 44px; }
    .manifesto { font-size: clamp(26px, 7.2vw, 38px); }
    .rule { margin: 0 22px; }
    .ribbon {
      grid-template-columns: 1fr;
      gap: 16px;
      padding: 22px 22px 18px;
    }
    .cta-wrap { padding: 12px 22px 44px; }
  }
</style>
</head>
<body>
  <section class="hero">

    <!-- 1. header -->
    <header class="header">
      <div class="wordmark">oikos</div>
      <div class="meta">delhi &middot; est. 2022</div>
    </header>

    <!-- 2. manifesto -->
    <div class="manifesto-wrap">
      <h1 class="manifesto">
        <span class="line">we are a small practice</span><br />
        <span class="line">making spaces and small <span class="em">objects</span></span><br />
        <span class="line">by hand, in delhi.</span>
      </h1>
    </div>

    <!-- 3. hairline rule -->
    <hr class="rule" />

    <!-- 4. process strip -->
    <div class="ribbon">
      <figure class="frame">
        <div class="photo">
          <img src="../../web/public/photos/biophilic.jpg" alt="biophilic interior detail" loading="lazy" />
        </div>
        <figcaption class="caption">
          <span class="num">01</span><span class="slash">/</span><span>interiors</span>
        </figcaption>
      </figure>

      <figure class="frame">
        <div class="photo">
          <img src="../../web/public/photos/gifting.jpg" alt="small-batch wedding favours" loading="lazy" />
        </div>
        <figcaption class="caption">
          <span class="num">02</span><span class="slash">/</span><span>favours</span>
        </figcaption>
      </figure>

      <figure class="frame">
        <div class="photo">
          <img src="../../web/public/photos/concierge.jpg" alt="quieter studio workplace" loading="lazy" />
        </div>
        <figcaption class="caption">
          <span class="num">03</span><span class="slash">/</span><span>studios</span>
        </figcaption>
      </figure>
    </div>

    <!-- 5. CTA -->
    <div class="cta-wrap">
      <a class="cta" href="#begin">
        begin a conversation
        <span class="arrow">&rarr;</span>
      </a>
    </div>

  </section>
</body>
</html>
