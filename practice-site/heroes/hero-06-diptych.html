<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>oikos — diptych</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@1,400;1,500&family=Inter:wght@200;300;400;500&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FFF8EB;
    --forest: #0B3910;
    --terracotta: #B46A2C;
    --sand: #ECCDB2;
    --honey: #DA9B66;
    --gold: #E4C58A;
    --earth: #3C230F;
    --berry: #6E1919;
    --sage: #939991;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  body {
    background: var(--cream);
    color: var(--forest);
    font-family: 'Inter', sans-serif;
    font-weight: 200;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
  }

  .hero {
    min-height: 100vh;
    display: grid;
    /* header — flexible breathing room — headline block — bottom rim photos */
    grid-template-rows: auto 1fr auto auto;
    padding: 0;
  }

  /* ----- header ----- */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 28px 40px 0 40px;
  }

  .header-left {
    display: flex;
    align-items: baseline;
    gap: 20px;
  }

  .wordmark {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 22px;
    letter-spacing: 0.02em;
    color: var(--forest);
    line-height: 1;
  }

  .meta {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 12px;
    letter-spacing: 0.04em;
    color: var(--sage);
    line-height: 1;
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }

  .meta-dot {
    color: var(--sand);
    font-size: 10px;
    line-height: 1;
  }

  .cta-pill {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 12px;
    letter-spacing: 0.06em;
    color: var(--forest);
    text-decoration: none;
    padding: 9px 18px;
    border: 1px solid var(--forest);
    border-radius: 999px;
    line-height: 1;
    transition: color 220ms cubic-bezier(0.22, 1, 0.36, 1), background-color 220ms cubic-bezier(0.22, 1, 0.36, 1);
  }
  .cta-pill:hover {
    background: var(--forest);
    color: var(--cream);
  }

  /* ----- headline ----- */
  .headline-block {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 56px 40px 64px 40px;
  }

  .headline {
    margin: 0;
    text-align: center;
    font-family: 'Inter', sans-serif;
    font-weight: 200;
    color: var(--forest);
    font-size: clamp(28px, 4.4vw, 56px);
    line-height: 1.28;
    letter-spacing: -0.01em;
    max-width: 22ch;
  }

  .headline em {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-weight: 400;
    color: var(--terracotta);
    /* slight optical adjust: italic Garamond sits a hair lower than Inter cap-height */
    letter-spacing: 0;
  }

  /* ----- diptych ----- */
  .diptych {
    display: grid;
    grid-template-columns: 1fr 1fr;
    align-items: end;
    width: 100%;
    /* the hairline */
    position: relative;
  }

  .diptych::before {
    content: "";
    position: absolute;
    top: 0;
    bottom: 28px; /* stop above the caption strip */
    left: 50%;
    width: 1px;
    background: var(--terracotta);
    transform: translateX(-0.5px);
    z-index: 2;
  }

  .frame {
    display: flex;
    flex-direction: column;
  }

  .photo {
    position: relative;
    width: 100%;
    /* 4:5 aspect — width:height = 4:5 → padding-top 125% */
    aspect-ratio: 4 / 5;
    overflow: hidden;
    background: var(--sand);
  }

  .photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .caption {
    padding: 14px 24px 24px 24px;
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 11.5px;
    letter-spacing: 0.04em;
    color: var(--sage);
    line-height: 1;
    text-transform: lowercase;
  }

  .frame--right .caption {
    text-align: right;
  }

  /* ----- responsive ----- */
  @media (max-width: 720px) {
    .header { padding: 22px 22px 0 22px; }
    .header-left { gap: 12px; flex-wrap: wrap; }
    .meta { font-size: 11px; gap: 8px; }
    .headline-block { padding: 40px 22px 40px 22px; }
    .headline { font-size: clamp(24px, 7.2vw, 38px); line-height: 1.3; }
    .caption { padding: 12px 16px 18px 16px; font-size: 10.5px; }
    .diptych::before { bottom: 22px; }
  }
</style>
</head>
<body>
  <section class="hero">

    <header class="header">
      <div class="header-left">
        <span class="wordmark">oikos</span>
        <span class="meta">
          <span>delhi</span>
          <span class="meta-dot">·</span>
          <span>28°c</span>
          <span class="meta-dot">·</span>
          <span>est. 2022</span>
        </span>
      </div>
      <a class="cta-pill" href="#work">see the practice</a>
    </header>

    <div></div>

    <div class="headline-block">
      <h1 class="headline">
        a small studio in delhi, working <em>slowly</em><br />
        with plants, hand-finished materials,<br />
        and the people who live in the room.
      </h1>
    </div>

    <div class="diptych">
      <figure class="frame frame--left">
        <div class="photo">
          <img src="../../web/public/photos/biophilic.jpg" alt="a living room in defence colony" />
        </div>
        <figcaption class="caption">a living room in defence colony</figcaption>
      </figure>
      <figure class="frame frame--right">
        <div class="photo">
          <img src="../../web/public/photos/concierge.jpg" alt="a studio concierge in nizamuddin east" />
        </div>
        <figcaption class="caption">a studio concierge in nizamuddin east</figcaption>
      </figure>
    </div>

  </section>
</body>
</html>
